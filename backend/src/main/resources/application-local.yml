spring:
  datasource:
    url: jdbc:h2:mem:tileforms;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: false
  data:
    redis:
      # Optional: start with `docker-compose up redis` if cart/caching features are needed
      host: localhost
      port: 6379
  mail:
    # Optional: start with `docker-compose up mailhog` if email features are needed
    host: localhost
    port: 1025

logging:
  level:
    com.tileforms: DEBUG
    org.springframework.security: DEBUG
